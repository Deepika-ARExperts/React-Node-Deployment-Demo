
name: Deploy app to S3 (Frontend) ECS (Backend) using CI/CD pipeline

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: 'eu-west-2'
  ECS_TASK_DEFINITION: ./backend/react-nodejs-app-task-definition.json 
  ECS_CONTAINER_NAME: react-nodejs-app-container
  ECS_SERVICE: react-nodejs-app-service 
  ECS_CLUSTER: react-node-app-demo-cluster 
  NODE_VERSION: '20.19.0' 


jobs:
  deploy-backend:
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: cicd-deployed-images-demo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build a docker container and
          # push it to ECR so that it can
          # be deployed to ECS.
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }} 

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER}}
          wait-for-service-stability: true

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend   # only runs if backend job passed AND stabilised
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: NodeJS Setup
        uses: actions/setup-node@v6
        with: 
          node-version: ${{ env.NODE_VERSION }}

      - name: Dependency Installation
        working-directory: ./frontend
        run: npm install

      - name: App Build
        working-directory: ./frontend
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to AWS S3
        run: aws s3 sync ./frontend/dist s3://react-demo-automated-deployment --delete